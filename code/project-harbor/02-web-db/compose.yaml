services:
  web:
    build: ./app
    image: harbor-web:0.2
    restart: unless-stopped
    ports: ["8080:80"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks: [frontend]

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  adminer:
    image: adminer:4
    restart: unless-stopped
    profiles: ["debug"]
    ports: ["8081:8080"]
    depends_on:
      db: { condition: service_healthy }
    networks: [backend]

networks:
  frontend:
  backend:
    internal: true

volumes:
  pgdata:
