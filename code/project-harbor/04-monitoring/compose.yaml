# Hinweis: Image-Versionen sind bewusst gepinnt (NICHT :latest), passend zur
# Empfehlung im Buch. Vor dem Einsatz die jeweils aktuelle stabile Version
# einsetzen -- siehe docs/release-checkliste.md.
services:
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    networks: [monitoring]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks: [monitoring]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    networks: [monitoring]

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    ports: ["3000:3000"]
    volumes:
      - grafanadata:/var/lib/grafana
    networks: [monitoring]

networks:
  monitoring:

volumes:
  promdata:
  grafanadata:
