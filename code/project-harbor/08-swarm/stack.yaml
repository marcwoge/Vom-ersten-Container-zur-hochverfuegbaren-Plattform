# Swarm-Stack: docker stack deploy -c stack.yaml harbor
services:
  web:
    image: nginx:1.27-alpine
    ports: ["80:80"]
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    networks: [harbor-overlay]

networks:
  harbor-overlay:
    driver: overlay
